<!DOCTYPE html>
<html>
<head>
    <title>Cat Birthday Adventure!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #fff0f5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Comic Sans MS', cursive;
            overflow-y: auto;
            padding: 20px;
            touch-action: manipulation;
        }

        h1 {
            text-align: center;
            margin: 20px 0 10px;
        }

        .game-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 780px;
        }

        .score-board {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            transform: scale(1.1);
            background: #ff1493;
        }

        .game-container {
            width: 780px;
            max-width: 95%;
            height: 600px;
            position: relative;
            background: #e0f7fa;
            border-radius: 15px;
            margin: 0 auto;
            overflow: visible;
            display: none;
        }

        .cell {
            position: absolute;
            font-size: 40px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #cat {
            transition: all 0.2s ease;
            z-index: 2;
        }

        .fish {
            color: #ff6b6b;
            animation: float 2s infinite;
        }

        .bomb {
            color: #2d3436;
            animation: rotate 3s infinite;
        }

        .tree {
            color: #2ecc71;
            font-size: 50px;
            z-index: 1;
        }

        /* Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            width: 100%;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }

        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,105,180,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(255,20,147,0.9);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 800px) {
            .game-container {
                height: 500px;
            }
            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }
            button {
                padding: 10px 20px;
                font-size: 14px;
            }
            .touch-controls {
                display: flex;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .touch-controls {
                display: flex !important;
                bottom: 20px;
                gap: 15px;
            }
            
            .touch-btn {
                width: 65px;
                height: 65px;
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .touch-controls {
                display: flex !important;
            }
        }
    </style>
</head>
<body>
    <h1>Happy Birthday! 😺 Collect Fish, Avoid Bombs! 🎉</h1>
    
    <div class="game-ui">
        <div class="score-board">
            Score: <span id="score">0</span> | 
            Time: <span id="timer">60</span>s
        </div>
        <div class="controls">
            <button id="startBtn">Start Game! 🎮</button>
            <button id="cardBtn" style="display: none;" onclick="window.location.href='birthday-card.html'">
                Birthday Card 🎂
            </button>
        </div>
    </div>
    
    <div class="game-container" id="gameArea"></div>

    <!-- Touch Controls -->
    <div class="touch-controls">
        <div class="touch-btn" id="touch-up">↑</div>
        <div class="touch-btn" id="touch-left">←</div>
        <div class="touch-btn" id="touch-down">↓</div>
        <div class="touch-btn" id="touch-right">→</div>
    </div>

    <script>
        const GRID_SIZE_X = 13;
        const GRID_SIZE_Y = 10;
        const CELL_SIZE = 60;
        let score = 0;
        let timeLeft = 60;
        let gameActive = true;
        let catPosition = { x: 0, y: 0 };
        let bombs = [];
        let trees = [];
        let fishes = [];
        let timerInterval;
        let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        function createElement(emoji, className) {
            const element = document.createElement('div');
            element.className = `cell ${className}`;
            element.innerHTML = emoji;
            return element;
        }

        function positionElement(element, x, y) {
            element.style.left = `${x * CELL_SIZE}px`;
            element.style.top = `${y * CELL_SIZE}px`;
        }

        function createTreeWall(startX, startY, length, vertical) {
            const maxX = GRID_SIZE_X - 1;
            const maxY = GRID_SIZE_Y - 1;
            
            const actualLength = Math.min(length, vertical ? maxY - startY : maxX - startX);
            
            for(let i = 0; i < actualLength; i++) {
                const x = vertical ? startX : startX + i;
                const y = vertical ? startY + i : startY;
                
                if(x > maxX || y > maxY) continue;
                
                const tree = createElement('🌳', 'tree');
                positionElement(tree, x, y);
                gameArea.appendChild(tree);
                trees.push({element: tree, x, y});
            }
        }

        function createObstacles() {
            bombs.forEach(bomb => bomb.element.remove());
            trees.forEach(tree => tree.element.remove());
            bombs = [];
            trees = [];

            createTreeWall(3, 2, 5, true);
            createTreeWall(5, 4, 4, false);
            createTreeWall(8, 3, 3, true);

            for(let i = 0; i < 7; i++) {
                const tree = createElement('🌳', 'tree');
                let x, y;
                do {
                    x = Math.floor(Math.random() * GRID_SIZE_X);
                    y = Math.floor(Math.random() * GRID_SIZE_Y);
                } while((x === 0 && y === 0));
                positionElement(tree, x, y);
                gameArea.appendChild(tree);
                trees.push({element: tree, x, y});
            }

            for(let i = 0; i < 15; i++) {
                createBomb();
            }
        }

        function createBomb() {
            const bomb = createElement('💣', 'bomb');
            let x, y;
            do {
                x = Math.floor(Math.random() * GRID_SIZE_X);
                y = Math.floor(Math.random() * GRID_SIZE_Y);
            } while((x === 0 && y === 0) || 
                   trees.some(t => t.x === x && t.y === y) ||
                   bombs.some(b => b.x === x && b.y === y));
            
            positionElement(bomb, x, y);
            gameArea.appendChild(bomb);
            bombs.push({element: bomb, x, y});
        }

        function createFish() {
            while(fishes.length < 3) {
                const fish = createElement('🐟', 'fish');
                let validPosition = false;
                let x, y;

                while(!validPosition) {
                    x = Math.floor(Math.random() * GRID_SIZE_X);
                    y = Math.floor(Math.random() * GRID_SIZE_Y);
                    
                    validPosition = !checkCollision(x, y) && 
                                !isPositionSurrounded(x, y);
                }
                
                positionElement(fish, x, y);
                gameArea.appendChild(fish);
                fishes.push({element: fish, x, y});
            }
        }

        function isPositionSurrounded(x, y) {
            const directions = [
                [x+1, y], [x-1, y],
                [x, y+1], [x, y-1]
            ];
            
            return directions.every(([nx, ny]) => {
                return checkCollision(nx, ny) || 
                    nx < 0 || nx >= GRID_SIZE_X ||
                    ny < 0 || ny >= GRID_SIZE_Y;
            });
        }

        function checkCollision(x, y) {
            if(bombs.some(b => b.x === x && b.y === y)) return 'bomb';
            if(fishes.some(f => f.x === x && f.y === y)) return 'fish';
            if(trees.some(t => t.x === x && t.y === y)) return 'tree';
            return false;
        }

        function moveCat(dx, dy) {
            if (!gameActive) return;

            // Smoother movement for touch devices
            if(isTouchDevice) {
                dx = dx * 0.8;
                dy = dy * 0.8;
            }

            const newX = Math.max(0, Math.min(GRID_SIZE_X - 1, catPosition.x + dx));
            const newY = Math.max(0, Math.min(GRID_SIZE_Y - 1, catPosition.y + dy));

            const collision = checkCollision(newX, newY);
            
            if(collision === 'tree') return;

            if(collision === 'bomb') {
                score = Math.max(0, Math.floor(score / 2));
                document.getElementById('score').textContent = score;
                
                const bombIndex = bombs.findIndex(b => b.x === newX && b.y === newY);
                if(bombIndex > -1) {
                    bombs[bombIndex].element.remove();
                    bombs.splice(bombIndex, 1);
                    createBomb();
                }
            }

            if(collision === 'fish') {
                const fishIndex = fishes.findIndex(f => f.x === newX && f.y === newY);
                if(fishIndex > -1) {
                    fishes[fishIndex].element.remove();
                    fishes.splice(fishIndex, 1);
                    score += 50;
                    document.getElementById('score').textContent = score;
                    createFish();
                }
            }

            catPosition = { x: newX, y: newY };
            positionElement(cat, catPosition.x, catPosition.y);
        }

        function setupTouchControls() {
            const touchUp = document.getElementById('touch-up');
            const touchLeft = document.getElementById('touch-left');
            const touchDown = document.getElementById('touch-down');
            const touchRight = document.getElementById('touch-right');

            touchUp.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveCat(0, -1);
            });
            touchLeft.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveCat(-1, 0);
            });
            touchDown.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveCat(0, 1);
            });
            touchRight.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveCat(1, 0);
            });

            // Prevent context menu on long press
            [touchUp, touchLeft, touchDown, touchRight].forEach(btn => {
                btn.addEventListener('contextmenu', (e) => e.preventDefault());
            });
        }

        function endGame(success) {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('cardBtn').style.display = 'inline-block';
            alert(success ? 
                `🎉 Birthday Success! Final Score: ${score}` : 
                `💥 Game Over! Happy Birthday! Final Score: ${score} 🎂`);
        }

        function resetGame() {
            score = 0;
            timeLeft = 60;
            catPosition = { x: 0, y: 0 };
            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '60';
            document.getElementById('cardBtn').style.display = 'none';
            
            positionElement(cat, 0, 0);
            
            createObstacles();
            createFish();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            
            gameActive = true;
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if(timeLeft <= 0) endGame(true);
        }

        function initializeGame() {
            document.querySelector('.game-container').style.display = 'block';
            document.getElementById('startBtn').textContent = 'Play Again! 🎮';
            resetGame();
        }

        function detectTouch() {
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.body.classList.add('touch-device');
                document.querySelector('.touch-controls').style.display = 'flex';
            }
        }

        const gameArea = document.getElementById('gameArea');
        const cat = createElement('😸', 'cat');
        gameArea.appendChild(cat);
        positionElement(cat, 0, 0);
        createObstacles();
        createFish();

        // Initialize controls
        document.getElementById('startBtn').addEventListener('click', initializeGame);
        setupTouchControls();

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if(!gameActive) return;
            
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }

            switch(e.key) {
                case 'ArrowUp': moveCat(0, -1); break;
                case 'ArrowDown': moveCat(0, 1); break;
                case 'ArrowLeft': moveCat(-1, 0); break;
                case 'ArrowRight': moveCat(1, 0); break;
            }
        });

        // Prevent zooming on mobile
        document.addEventListener('touchmove', function(e) {
            if(e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });

        window.onload = detectTouch;
    </script>
</body>
</html>
